<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenSearch Dependency Galaxy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #e0f0ff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
  canvas { display: block; }
  #info { position: absolute; top: 16px; left: 16px; pointer-events: none; }
  #info h1 { font-size: 20px; letter-spacing: 2px; }
  #info h1 span { color: #00b4d8; }
  #info p { color: #4a6a8a; font-size: 11px; margin-top: 4px; }
  #tooltip { position: absolute; display: none; background: #0d1a2aee; border: 1px solid #1a2a44; border-radius: 8px; padding: 12px 16px; pointer-events: none; max-width: 260px; font-size: 12px; }
  #tooltip h3 { color: #00b4d8; margin-bottom: 4px; }
  #tooltip .deps { color: #5a7a9a; font-size: 11px; margin-top: 6px; }
  #tooltip .dep-item { color: #00e5a0; }
  #legend { position: absolute; bottom: 16px; left: 16px; font-size: 10px; color: #3a5a7a; }
  #legend .leg-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  #legend .leg-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>
<div id="info">
  <h1>🌌 <span>OpenSearch</span> Dependency Galaxy</h1>
  <p>Drag to rotate · Scroll to zoom · Hover for details</p>
</div>
<div id="tooltip"><h3 id="ttName"></h3><div id="ttType" style="color:#8899aa;font-size:11px"></div><div class="deps" id="ttDeps"></div></div>
<div id="legend"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── DEPENDENCY DATA ──
const NODES = [
  { id: 'OpenSearch', type: 'core', size: 3, color: '#ff9f1c' },
  { id: 'OpenSearch-Dashboards', type: 'core', size: 2.5, color: '#00b4d8' },
  { id: 'job-scheduler', type: 'plugin', size: 1.2, color: '#00e5a0' },
  { id: 'common-utils', type: 'lib', size: 1.4, color: '#8338ec' },
  { id: 'security', type: 'plugin', size: 1.8, color: '#ff006e' },
  { id: 'alerting', type: 'plugin', size: 1.5, color: '#00e5a0' },
  { id: 'index-management', type: 'plugin', size: 1.3, color: '#00e5a0' },
  { id: 'anomaly-detection', type: 'plugin', size: 1.4, color: '#00e5a0' },
  { id: 'sql', type: 'plugin', size: 1.3, color: '#00e5a0' },
  { id: 'ml-commons', type: 'plugin', size: 1.5, color: '#00e5a0' },
  { id: 'neural-search', type: 'plugin', size: 1.2, color: '#00e5a0' },
  { id: 'k-NN', type: 'plugin', size: 1.4, color: '#00e5a0' },
  { id: 'reporting', type: 'plugin', size: 1.1, color: '#00e5a0' },
  { id: 'observability', type: 'plugin', size: 1.2, color: '#00e5a0' },
  { id: 'notifications', type: 'plugin', size: 1.1, color: '#00e5a0' },
  { id: 'cross-cluster-replication', type: 'plugin', size: 1.1, color: '#00e5a0' },
  { id: 'geospatial', type: 'plugin', size: 1.0, color: '#00e5a0' },
  { id: 'performance-analyzer', type: 'plugin', size: 1.2, color: '#00e5a0' },
  { id: 'asynchronous-search', type: 'plugin', size: 1.0, color: '#00e5a0' },
  { id: 'flow-framework', type: 'plugin', size: 1.1, color: '#00e5a0' },
  { id: 'dashboards-visualizations', type: 'dashboards-plugin', size: 1.0, color: '#3a86ff' },
  { id: 'dashboards-maps', type: 'dashboards-plugin', size: 1.0, color: '#3a86ff' },
  { id: 'dashboards-observability', type: 'dashboards-plugin', size: 1.0, color: '#3a86ff' },
  { id: 'dashboards-query-workbench', type: 'dashboards-plugin', size: 1.0, color: '#3a86ff' },
  { id: 'dashboards-reporting', type: 'dashboards-plugin', size: 1.0, color: '#3a86ff' },
];

const EDGES = [
  // Core dependencies
  { from: 'security', to: 'OpenSearch' },
  { from: 'job-scheduler', to: 'OpenSearch' },
  { from: 'common-utils', to: 'OpenSearch' },
  { from: 'alerting', to: 'OpenSearch' },
  { from: 'alerting', to: 'common-utils' },
  { from: 'alerting', to: 'notifications' },
  { from: 'alerting', to: 'job-scheduler' },
  { from: 'index-management', to: 'OpenSearch' },
  { from: 'index-management', to: 'common-utils' },
  { from: 'index-management', to: 'job-scheduler' },
  { from: 'index-management', to: 'notifications' },
  { from: 'anomaly-detection', to: 'OpenSearch' },
  { from: 'anomaly-detection', to: 'common-utils' },
  { from: 'anomaly-detection', to: 'job-scheduler' },
  { from: 'sql', to: 'OpenSearch' },
  { from: 'ml-commons', to: 'OpenSearch' },
  { from: 'ml-commons', to: 'common-utils' },
  { from: 'neural-search', to: 'OpenSearch' },
  { from: 'neural-search', to: 'ml-commons' },
  { from: 'neural-search', to: 'k-NN' },
  { from: 'k-NN', to: 'OpenSearch' },
  { from: 'reporting', to: 'OpenSearch' },
  { from: 'reporting', to: 'job-scheduler' },
  { from: 'observability', to: 'OpenSearch' },
  { from: 'notifications', to: 'OpenSearch' },
  { from: 'notifications', to: 'common-utils' },
  { from: 'cross-cluster-replication', to: 'OpenSearch' },
  { from: 'geospatial', to: 'OpenSearch' },
  { from: 'geospatial', to: 'job-scheduler' },
  { from: 'performance-analyzer', to: 'OpenSearch' },
  { from: 'asynchronous-search', to: 'OpenSearch' },
  { from: 'asynchronous-search', to: 'common-utils' },
  { from: 'flow-framework', to: 'OpenSearch' },
  { from: 'flow-framework', to: 'ml-commons' },
  // Dashboards plugins
  { from: 'dashboards-visualizations', to: 'OpenSearch-Dashboards' },
  { from: 'dashboards-maps', to: 'OpenSearch-Dashboards' },
  { from: 'dashboards-maps', to: 'geospatial' },
  { from: 'dashboards-observability', to: 'OpenSearch-Dashboards' },
  { from: 'dashboards-observability', to: 'observability' },
  { from: 'dashboards-query-workbench', to: 'OpenSearch-Dashboards' },
  { from: 'dashboards-query-workbench', to: 'sql' },
  { from: 'dashboards-reporting', to: 'OpenSearch-Dashboards' },
  { from: 'dashboards-reporting', to: 'reporting' },
];

// ── THREE.JS SCENE ──
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 0, 70);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;

// Starfield background
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 2000; i++) {
  starVerts.push((Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.5 })));

// ── FORCE SIMULATION ──
// Initialize positions randomly on a sphere
const nodeMap = {};
NODES.forEach((n, i) => {
  const phi = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;
  const r = 25 + Math.random() * 10;
  n.x = r * Math.sin(phi) * Math.cos(theta);
  n.y = r * Math.sin(phi) * Math.sin(theta);
  n.z = r * Math.cos(phi);
  n.vx = 0; n.vy = 0; n.vz = 0;
  nodeMap[n.id] = n;
});
// Core nodes at center
nodeMap['OpenSearch'].x = -6; nodeMap['OpenSearch'].y = 0; nodeMap['OpenSearch'].z = 0;
nodeMap['OpenSearch-Dashboards'].x = 6; nodeMap['OpenSearch-Dashboards'].y = 0; nodeMap['OpenSearch-Dashboards'].z = 0;

function simulate() {
  const alpha = 0.02;
  // Repulsion between all nodes — stronger push
  for (let i = 0; i < NODES.length; i++) {
    for (let j = i + 1; j < NODES.length; j++) {
      const a = NODES[i], b = NODES[j];
      let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
      let dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 0.1;
      let force = 30 / (dist * dist);
      a.vx -= dx/dist * force * alpha; a.vy -= dy/dist * force * alpha; a.vz -= dz/dist * force * alpha;
      b.vx += dx/dist * force * alpha; b.vy += dy/dist * force * alpha; b.vz += dz/dist * force * alpha;
    }
  }
  // Attraction along edges — longer ideal distance
  EDGES.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
    let dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 0.1;
    let force = (dist - 14) * 0.008;
    a.vx += dx/dist * force; a.vy += dy/dist * force; a.vz += dz/dist * force;
    b.vx -= dx/dist * force; b.vy -= dy/dist * force; b.vz -= dz/dist * force;
  });
  // Gentle center gravity
  NODES.forEach(n => {
    n.vx -= n.x * 0.001; n.vy -= n.y * 0.001; n.vz -= n.z * 0.001;
    n.vx *= 0.85; n.vy *= 0.85; n.vz *= 0.85;
    n.x += n.vx; n.y += n.vy; n.z += n.vz;
  });
}

// Run simulation to settle
for (let i = 0; i < 500; i++) simulate();

// ── CREATE MESHES ──
const spheres = [];
const spriteMap = {};
NODES.forEach(n => {
  const geo = new THREE.SphereGeometry(n.size * 0.5, 16, 16);
  const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(n.color), transparent: true, opacity: 0.85 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(n.x, n.y, n.z);
  mesh.userData = n;
  scene.add(mesh);
  spheres.push(mesh);

  // Glow
  const glowGeo = new THREE.SphereGeometry(n.size * 0.8, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(n.color), transparent: true, opacity: 0.1 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.copy(mesh.position);
  scene.add(glow);

  // Label
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256; canvas.height = 64;
  ctx.font = 'bold 20px -apple-system, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText(n.id.length > 22 ? n.id.slice(0,20)+'..' : n.id, 128, 36);
  const tex = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.7 });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(n.x, n.y + n.size * 0.7 + 1, n.z);
  sprite.scale.set(6, 1.5, 1);
  scene.add(sprite);
  spriteMap[n.id] = sprite;
});

// Edges as glowing tubes with animated particles
const edgeMeshes = [];
const particles = [];

EDGES.forEach(e => {
  const a = nodeMap[e.from], b = nodeMap[e.to];
  if (!a || !b) return;

  const start = new THREE.Vector3(a.x, a.y, a.z);
  const end = new THREE.Vector3(b.x, b.y, b.z);
  const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
  // Curve outward for visual clarity
  const offset = new THREE.Vector3(
    (Math.random() - 0.5) * 3,
    (Math.random() - 0.5) * 3,
    (Math.random() - 0.5) * 3
  );
  mid.add(offset);

  const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
  const points = curve.getPoints(30);

  // Tube
  const tubeGeo = new THREE.TubeGeometry(curve, 20, 0.04, 4, false);
  const tubeMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(b.color || '#00b4d8'),
    transparent: true,
    opacity: 0.2
  });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);
  scene.add(tube);
  edgeMeshes.push(tube);

  // Animated particle flowing along the edge
  const pGeo = new THREE.SphereGeometry(0.12, 6, 6);
  const pMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(b.color || '#00b4d8'),
    transparent: true,
    opacity: 0.8
  });
  const particle = new THREE.Mesh(pGeo, pMat);
  particle.userData = { curve, speed: 0.002 + Math.random() * 0.003, t: Math.random() };
  scene.add(particle);
  particles.push(particle);
});

// ── HOVER DETECTION ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(spheres);
  if (hits.length) {
    const n = hits[0].object.userData;
    const deps = EDGES.filter(e => e.from === n.id).map(e => e.to);
    const usedBy = EDGES.filter(e => e.to === n.id).map(e => e.from);
    document.getElementById('ttName').textContent = n.id;
    document.getElementById('ttType').textContent = n.type;
    let depsHtml = '';
    if (deps.length) depsHtml += `<div>Depends on: ${deps.map(d=>`<span class="dep-item">${d}</span>`).join(', ')}</div>`;
    if (usedBy.length) depsHtml += `<div style="margin-top:4px">Used by: ${usedBy.map(d=>`<span class="dep-item">${d}</span>`).join(', ')}</div>`;
    document.getElementById('ttDeps').innerHTML = depsHtml || '<div>No dependencies</div>';
    tooltip.style.display = 'block';
    tooltip.style.left = e.clientX + 16 + 'px';
    tooltip.style.top = e.clientY + 16 + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

// Legend
const types = { core: '#ff9f1c', plugin: '#00e5a0', 'dashboards-plugin': '#3a86ff', lib: '#8338ec' };
document.getElementById('legend').innerHTML = Object.entries(types).map(([t,c]) =>
  `<div class="leg-item"><div class="leg-dot" style="background:${c}"></div>${t}</div>`
).join('');

// ── ANIMATE ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Animate particles along edges
  particles.forEach(p => {
    p.userData.t += p.userData.speed;
    if (p.userData.t > 1) p.userData.t = 0;
    const pos = p.userData.curve.getPoint(p.userData.t);
    p.position.copy(pos);
  });

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
